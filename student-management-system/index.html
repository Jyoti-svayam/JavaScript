<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Management System</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<h2>Student Management System</h2>

<!-- Student Form -->
<form id="studentForm">
<label for="name">Name:</label>
<input type="text" id="name" placeholder="Enter student name">

<label for="roll">Roll Number:</label>
<input type="number" id="roll" placeholder="Enter unique roll number">

<label for="course">Course:</label>
<input type="text" id="course" placeholder="Enter course name">

<label for="marks">Marks:</label>
<input type="number" id="marks" placeholder="Enter marks (0-100)">

<button type="submit">Add Student</button>
<span class="error" id="formError"></span>
</form>

<hr>

<!-- Search Bar -->
<label for="search">Search by Name:</label>
<input type="text" id="search" placeholder="Enter student name to search">

<hr>
<!-- Students Table -->
<h3>Total Students: <span id="totalStudents">0</span></h3>

<table id="studentTable">
<thead>
<tr>
<th>Roll No</th>
<th>Name</th>
<th>Course</th>
<th>Marks</th>
<th>Status</th>
<th>Actions</th>
</tr>
</thead>
<tbody>
<!-- Rows will be added dynamically -->
</tbody>
</table>

<script src="script.js"></script>
</body>
</html>
